server:
  port: 8080

spring:
  application:
    name: philosophy-backend
  datasource:
    url: jdbc:mysql://localhost:3306/philosophy_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    root: INFO
    org.springframework.security: INFO

