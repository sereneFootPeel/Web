# Philosophy Backend API - Port 8080 for Vite proxy
server.port=8080

# Database - use same DB as Philosophy Website
spring.datasource.url=jdbc:mysql://localhost:3306/philosophy_db
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:Mmoonj10y?}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.data-source-properties.useSSL=false
spring.datasource.hikari.data-source-properties.serverTimezone=UTC
spring.datasource.hikari.data-source-properties.allowPublicKeyRetrieval=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.com.philosophy=INFO
logging.level.org.springframework.security=INFO

# File upload
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
server.tomcat.max-http-form-post-size=-1

# Daily report email (used by DailyReportScheduler)
app.daily-report.email.recipient=${DAILY_REPORT_RECIPIENT:shangyu54shoulia@163.com}
app.csv-email.enabled=${CSV_EMAIL_ENABLED:false}
app.csv-email.cron=0 0 8 * * ?

# Mail (163 邮箱 - 生产环境建议使用环境变量 MAIL_USER/MAIL_PASSWORD)
spring.mail.host=smtp.163.com
spring.mail.port=465
spring.mail.username=${MAIL_USER:shangyu54shoulia@163.com}
spring.mail.password=${MAIL_PASSWORD:XW4g38hW8Qphjvs}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
