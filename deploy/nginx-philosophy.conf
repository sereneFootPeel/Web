# 哲学站 Nginx 配置
# 80 端口 -> 前端 5173，/api 等 -> 后端 8080
# 使用前将 your-domain-or-ip 替换为实际域名或服务器 IP

server {
    listen 80;
    server_name your-domain-or-ip;

    client_max_body_size 50M;

    # 前端（Vite 开发服务器 5173）
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后端 API 及 Thymeleaf 测试页
    location /api { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /likes { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /language { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /mmpi { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /mbti { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /enneagram { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /bigfive { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /values8 { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /tests { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /css { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
    location /data { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
    location /uploads { proxy_pass http://127.0.0.1:8080; proxy_set_header Host $host; }
}
